services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexion_monorepo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nexion_monorepo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: nexion-api-dev
    build:
      context: .
      target: deps
    working_dir: /app
    command: npm run dev -w api
    environment:
      NODE_ENV: development
      PORT: ${API_INTERNAL_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nexion_monorepo}?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${API_PORT:-3001}:${API_INTERNAL_PORT:-3000}"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: nexion-web-dev
    build:
      context: .
      target: deps
    working_dir: /app
    command: npm run dev -w web -- --hostname 0.0.0.0
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      WATCHPACK_POLLING: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
      - web_node_modules:/app/apps/web/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  root_node_modules:
  api_node_modules:
  web_node_modules:
  web_next:
